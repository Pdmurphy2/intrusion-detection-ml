<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h1>Login successful</h1>
    <p>Select the remaining feature values, then log out.</p>

    <form method="POST" action="{{ url_for('logout') }}">
        <label for="network_packet_size">Network Packet Size:</label>
        <input type="number" name="network_packet_size" required><br><br>

        <label for="protocol_type">Protocol Type:</label>
        <select name="protocol_type" required>
            <option value="TCP">TCP</option>
            <option value="UDP">UDP</option>
            <option value="ICMP">ICMP</option>
        </select><br><br>

        <label for="encryption_used">Encryption Used:</label>
        <select name="encryption_used" required>
            <option value="AES">AES</option>
            <option value="DES">DES</option>
            <option value="None">None</option>
        </select><br><br>

        <label for="ip_reputation_score">IP Reputation Score:</label>
        <input type="number" step="0.01" min="0" max="1" name="ip_reputation_score" required><br><br>

        <label for="browser_type">Browser Type:</label>
        <select name="browser_type" required>
            <option value="Chrome">Chrome</option>
            <option value="Firefox">Firefox</option>
            <option value="Edge">Edge</option>
            <option value="Safari">Safari</option>
            <option value="Unknown">Unknown</option>
        </select><br><br>

        <label for="unusual_time_access">Unusual Time Access:</label>
        <select name="unusual_time_access" required>
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select><br><br>

        <button type="submit">Save and Log Out</button>
    </form>
</body>
</html>
